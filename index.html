<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAVE 아카이브</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --yejun:#4da6ff;--noah:#a855f7;--bambi:#ff6b9d;--eunho:#ff5252;--hamin:#52cc7a;
  --all:#f0e6ff;--bg:#060611;--bg2:#0d0d1f;--bg3:#12122a;--card:#0f0f23;
  --border:rgba(255,255,255,0.07);--text:#e8e8f0;--muted:#8888aa;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-top:0;}
body::before{content:'';position:fixed;inset:0;
  background-image:
    radial-gradient(1px 1px at 15% 20%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 45% 10%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 70% 35%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 85% 15%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 30% 55%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 60% 70%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 60%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 10% 80%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 50% 85%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 90%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 25% 40%,rgba(255,255,255,.15) 0%,transparent 100%),
    radial-gradient(1px 1px at 55% 45%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 38% 72%,rgba(255,255,255,.15) 0%,transparent 100%),
    radial-gradient(1px 1px at 92% 30%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 5% 50%,rgba(255,255,255,.15) 0%,transparent 100%);
  pointer-events:none;z-index:0;}

header{position:sticky;top:0;z-index:101;background:rgba(6,6,17,.97);backdrop-filter:blur(12px);text-align:center;padding:18px 20px 14px;border-bottom:1px solid var(--border);}

.logo-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(22px,4.5vw,42px);letter-spacing:.12em;
  background:linear-gradient(90deg,var(--yejun) 0%,var(--yejun) 12%,var(--noah) 28%,var(--bambi) 50%,var(--eunho) 72%,var(--hamin) 88%,var(--hamin) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-sub{font-size:11px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;margin-top:5px;}

.tab-bar{position:sticky;top:0;z-index:100;background:rgba(6,6,17,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.tab-row{max-width:1200px;margin:0 auto;display:flex;padding:0 16px;align-items:center;justify-content:space-between;}
.btn-add-live{background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.3);border-radius:7px;
  color:var(--noah);font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:500;
  padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:5px;
  transition:background .15s,border-color .15s;white-space:nowrap;}
.btn-add-live:hover{background:rgba(168,85,247,.22);border-color:rgba(168,85,247,.5);}
.tab-btn{background:transparent;border:none;color:var(--muted);font-family:'Syne',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;padding:13px 18px;cursor:pointer;border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;white-space:nowrap;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--text);border-bottom-color:var(--noah);}

.controls{position:sticky;top:0;z-index:99;background:rgba(6,6,17,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 20px;isolation:isolate;}
#filters-collapsible{transition:max-height .18s cubic-bezier(0.4,0,0.2,1),opacity .15s ease;overflow:hidden;max-height:300px;opacity:1;position:relative;}
#filters-collapsible.collapsed{max-height:0!important;opacity:0;}
#filters-collapsible::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,transparent,var(--bg));opacity:0;pointer-events:none;transition:opacity .1s ease;z-index:1;}
#filters-collapsible::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to top,transparent,var(--bg));opacity:0;pointer-events:none;transition:opacity .1s ease;z-index:1;}
#filters-collapsible.collapsing::after{opacity:1;}
#filters-collapsible.expanding::before{opacity:1;}
.controls-inner{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:6px;}
.search-row{position:relative;}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:8px 72px 8px 36px;color:#ffffff;font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:rgba(168,85,247,.5);background:var(--bg3);}
.search-input:-webkit-autofill,.search-input:-webkit-autofill:focus{-webkit-box-shadow:0 0 0 1000px var(--bg3) inset;-webkit-text-fill-color:#ffffff;}
.search-input::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.filter-divider{width:1px;height:18px;background:var(--border);align-self:center;}
.btn{border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:4px 11px;font-family:'Noto Sans KR',sans-serif;
  font-size:11px;cursor:pointer;background:transparent;color:rgba(255,255,255,.3);transition:all .15s;white-space:nowrap;}
.btn:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);}
.btn.active{color:#fff;background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.35);}
.btn-yejun.active{color:var(--yejun);border-color:var(--yejun);background:rgba(77,166,255,.1);}
.btn-noah.active{color:var(--noah);border-color:var(--noah);background:rgba(168,85,247,.1);}
.btn-bambi.active{color:var(--bambi);border-color:var(--bambi);background:rgba(255,107,157,.1);}
.btn-eunho.active{color:var(--eunho);border-color:var(--eunho);background:rgba(255,82,82,.1);}
.btn-hamin.active{color:var(--hamin);border-color:var(--hamin);background:rgba(82,204,122,.1);}
.btn-all.active{color:#fff;background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.4);}
/* grad-border: .btn과 세로 동일, 가로 넓게, 흰색 텍스트 */
.grad-border{color:#ffffff !important;border:1.5px solid transparent;
  border-radius:8px;padding:4px 18px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  font-size:11px;font-weight:600;min-width:48px;text-align:center;
  background:linear-gradient(#0d0d1e,#0d0d1e) padding-box,
    linear-gradient(160deg,#4da6ff,#a855f7,#ff6b9d,#ff5252,#f97316,#84cc16) border-box;}
.filter-label{font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:600;
  color:rgba(255,255,255,.3);white-space:nowrap;}
.filter-label-btn{white-space:nowrap;transition:color .15s;}
.era-scroll{overflow-x:auto;overflow-y:hidden;flex-wrap:nowrap!important;scrollbar-width:none;-ms-overflow-style:none;min-width:0;cursor:grab;}
.era-scroll.dragging{cursor:grabbing;user-select:none;}
.era-scroll::-webkit-scrollbar{display:none;}
@media(max-width:500px){
  .filter-row-labeled > div[style*="flex-wrap:wrap"]{flex-wrap:nowrap!important;overflow-x:auto;scrollbar-width:none;}
  .filter-row-labeled > div[style*="flex-wrap:wrap"]::-webkit-scrollbar{display:none;}
}
.era-row-sep{width:100%;height:1px;background:var(--border);flex-shrink:0;margin:2px 0;}
/* 생일: 미선택=흐림, 선택=민트 테두리만 */
.btn.btn-special{border:1px solid rgba(255,255,255,.12) !important;color:rgba(255,255,255,.3) !important;background:transparent !important;}
.btn.btn-special.active{border:1px solid #2dd4bf !important;color:#2dd4bf !important;background:transparent !important;}
.btn.btn-special:hover{color:rgba(255,255,255,.7) !important;background:rgba(255,255,255,.04) !important;}
/* 컴백: 미선택=흐림, 선택=골드 테두리만 */
.btn.btn-comeback{border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.3);background:transparent;}
.btn.btn-comeback.active{border:1px solid #e8c97a !important;color:#e8c97a !important;background:transparent !important;}
.btn.btn-comeback:hover{color:rgba(255,255,255,.7);background:rgba(255,255,255,.04);}
.filter-sep{width:1px;background:rgba(255,255,255,.1);flex-shrink:0;height:22px;align-self:center;}
.filter-row-labeled{display:flex;align-items:center;gap:10px;min-width:0;}
.filter-row-labeled > div[style*="flex:1"]{min-width:0;overflow-x:auto;scrollbar-width:none;}
.filter-row-labeled > div[style*="flex:1"]::-webkit-scrollbar{display:none;}
.card.special-bday{box-shadow:0 0 0 1.5px rgba(45,212,191,.6),0 0 16px rgba(45,212,191,.2);}
.card.special-bday::before{opacity:1!important;background:linear-gradient(90deg,#2dd4bf,#a7f3d0,#2dd4bf)!important;}
.card.special-milestone{box-shadow:0 0 0 1.5px rgba(45,212,191,.6),0 0 16px rgba(45,212,191,.2);}
.card.special-milestone::before{opacity:1!important;background:linear-gradient(90deg,#2dd4bf,#a7f3d0,#2dd4bf)!important;}

/* era buttons: default border/text same as year buttons, fill with era color */
.era-기다릴게{background:rgba(30,58,138,.2);}
.era-삼왜{background:rgba(244,114,182,.2);}
.era-여여름{background:rgba(132,204,22,.2);}
.era-메리플리{background:rgba(100,100,100,.2);}
.era-웨사럽{background:rgba(148,163,184,.2);}
.era-펌펍볼{background:rgba(249,115,22,.2);}
.era-대쉬{background:rgba(80,80,80,.2);}
.era-카쿠렌보{background:rgba(56,189,248,.2);}
.era-숨꼭{background:rgba(249,168,212,.2);}
.era-뿌우{background:rgba(30,58,138,.2);}
.era-뿌우크리{background:rgba(248,113,113,.2);}
.era-칼파투{background:rgba(220,38,38,.2);}
.era-기다릴게.active,.era-기다릴게:hover{background:rgba(30,58,138,.35);}
.era-삼왜.active,.era-삼왜:hover{background:rgba(244,114,182,.35);}
.era-여여름.active,.era-여여름:hover{background:rgba(132,204,22,.35);}
.era-메리플리.active,.era-메리플리:hover{background:rgba(100,100,100,.35);}
.era-웨사럽.active,.era-웨사럽:hover{background:rgba(148,163,184,.35);}
.era-펌펍볼.active,.era-펌펍볼:hover{background:rgba(249,115,22,.35);}
.era-대쉬.active,.era-대쉬:hover{background:rgba(80,80,80,.35);}
.era-카쿠렌보.active,.era-카쿠렌보:hover{background:rgba(56,189,248,.35);}
.era-숨꼭.active,.era-숨꼭:hover{background:rgba(249,168,212,.35);}
.era-뿌우.active,.era-뿌우:hover{background:rgba(30,58,138,.35);}
.era-뿌우크리.active,.era-뿌우크리:hover{background:rgba(248,113,113,.35);}
.era-칼파투.active,.era-칼파투:hover{background:rgba(220,38,38,.35);}

main{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:18px 16px 60px;}
.result-count{font-size:11px;color:var(--muted);margin-bottom:12px;padding:0 2px;}
.section-view{display:none;}
.section-view.active{display:block;}
.year-section{margin-bottom:26px;}
.year-header{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.year-label{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;}
.year-line{flex:1;height:1px;background:var(--border);}
.year-count{font-size:11px;color:var(--muted);}
.month-section{margin-bottom:18px;}
.month-header{display:flex;align-items:center;gap:8px;margin-bottom:7px;padding-left:2px;}
.month-label{font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--muted);min-width:28px;}
.month-line{flex:1;height:1px;background:var(--border);opacity:.45;}
.month-count{font-size:10px;color:var(--muted);opacity:.7;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:8px;}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;
  transition:border-color .2s,transform .15s,box-shadow .2s;position:relative;overflow:hidden;cursor:pointer;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .2s;}
.card:hover{border-color:rgba(255,255,255,.18);transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.35);}
.card:hover::before{opacity:1;}
.card:hover .card-edit-hint{opacity:1;}
.card.c-yejun::before{background:var(--yejun);}
.card.c-noah::before{background:var(--noah);}
.card.c-bambi::before{background:var(--bambi);}
.card.c-eunho::before{background:var(--eunho);}
.card.c-hamin::before{background:var(--hamin);}
.card.c-all::before{background:linear-gradient(90deg,var(--yejun),var(--noah),var(--bambi),var(--eunho),var(--hamin));}
.card.c-mixed::before{background:linear-gradient(90deg,var(--yejun),var(--noah));}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.card-date{font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--muted);}
.card-badges{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;align-items:center;}
.badge{font-size:10px;border-radius:4px;padding:1px 6px;letter-spacing:.02em;}
.badge-bday{background:rgba(255,215,0,.1);color:#ffd700;border:1px solid rgba(255,215,0,.22);}
.badge-debut{background:rgba(168,85,247,.1);color:var(--noah);border:1px solid rgba(168,85,247,.22);}
.badge-predebut{background:rgba(77,166,255,.08);color:var(--yejun);border:1px solid rgba(77,166,255,.16);}
.badge-type-live{background:rgba(77,166,255,.07);color:#6a9fd8;border:1px solid rgba(77,166,255,.14);font-size:9px;}
.badge-type-radio{background:rgba(82,204,122,.07);color:#4aaa66;border:1px solid rgba(82,204,122,.18);font-size:9px;}
.badge-type-lassgo{background:rgba(255,183,77,.08);color:#ffb74d;border:1px solid rgba(255,183,77,.2);font-size:9px;}
.card-title{font-size:12px;line-height:1.5;color:var(--text);margin-bottom:8px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card-ep{font-family:'Syne',sans-serif;font-size:11px;color:var(--muted);margin-bottom:7px;letter-spacing:.05em;}
.card-row{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px;}
.card-row-label{font-size:10px;color:var(--muted);white-space:nowrap;margin-top:3px;}
.card-members{display:flex;gap:4px;flex-wrap:wrap;}
.member-pill{font-size:11px;border-radius:8px;padding:3px 9px;font-weight:500;border:1px solid transparent;display:inline-flex;align-items:center;gap:3px;}
.pill-yejun{background:rgba(77,166,255,.1);color:var(--yejun);border-color:rgba(77,166,255,.35);}
.pill-noah{background:rgba(168,85,247,.1);color:var(--noah);border-color:rgba(168,85,247,.35);}
.pill-bambi{background:rgba(255,107,157,.1);color:var(--bambi);border-color:rgba(255,107,157,.35);}
.pill-eunho{background:rgba(255,82,82,.1);color:var(--eunho);border-color:rgba(255,82,82,.35);}
.pill-hamin{background:rgba(82,204,122,.1);color:var(--hamin);border-color:rgba(82,204,122,.35);}
.pill-all{background:rgba(240,230,255,.07);color:var(--all);border-color:rgba(240,230,255,.2);}
.guest-none{font-size:11px;color:var(--muted);}
.guest-special{background:rgba(255,215,0,.08);color:#d4a800;border:1px solid rgba(255,215,0,.18);
  border-radius:4px;padding:2px 7px;font-size:11px;}

/* Saved data on card */
.card-extras{margin-top:8px;display:flex;flex-direction:column;gap:5px;}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;}
.card-tag{font-size:10px;padding:1px 8px;border-radius:10px;
  background:rgba(168,85,247,.1);color:var(--noah);border:1px solid rgba(168,85,247,.18);}
/* tag group styles */
.tg-tabs{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border);margin-bottom:10px;}
.tg-tab{flex:1;background:transparent;border:none;color:var(--muted);font-family:'Syne',sans-serif;
  font-size:10px;font-weight:600;letter-spacing:.12em;padding:7px 4px;cursor:pointer;transition:all .15s;text-transform:uppercase;}
.tg-tab:not(:last-child){border-right:1px solid var(--border);}
.tg-tab.active-a{background:rgba(168,85,247,.1);color:var(--noah);}
.tg-tab.active-b{background:rgba(77,166,255,.1);color:var(--yejun);}
.tg-tab.active-c{background:rgba(82,204,122,.1);color:var(--hamin);}
.m-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px 3px 11px;border-radius:12px;}
.m-tag-a{background:rgba(168,85,247,.12);color:var(--noah);border:1px solid rgba(168,85,247,.22);}
.m-tag-b{background:rgba(77,166,255,.1);color:var(--yejun);border:1px solid rgba(77,166,255,.2);}
.m-tag-c{background:rgba(82,204,122,.1);color:var(--hamin);border:1px solid rgba(82,204,122,.2);}
.card-tag-a{background:rgba(168,85,247,.1);color:var(--noah);border:1px solid rgba(168,85,247,.18);}
.card-tag-b{background:rgba(77,166,255,.08);color:var(--yejun);border:1px solid rgba(77,166,255,.16);}
.card-tag-c{background:rgba(82,204,122,.08);color:var(--hamin);border:1px solid rgba(82,204,122,.18);}
.tag-grp-label{font-size:9px;opacity:.55;margin-right:1px;}
.card-links{display:flex;gap:4px;flex-wrap:wrap;}
.card-link{font-size:10px;padding:1px 8px;border-radius:4px;
  background:rgba(77,166,255,.08);color:var(--yejun);border:1px solid rgba(77,166,255,.16);
  text-decoration:none;transition:background .15s;}
.card-link:hover{background:rgba(77,166,255,.2);}
.card-edit-hint{position:absolute;bottom:8px;right:10px;font-size:9px;color:var(--muted);
  opacity:0;transition:opacity .2s;pointer-events:none;letter-spacing:.05em;}

/* sort toggle */
.sort-toggle{display:flex;border-radius:6px;overflow:hidden;border:1px solid var(--border);flex-shrink:0;}
.sort-btn{background:transparent;border:none;color:var(--muted);font-family:'Syne',sans-serif;font-size:10px;
  font-weight:600;letter-spacing:.06em;padding:5px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.sort-btn:not(:last-child){border-right:1px solid var(--border);}
.sort-btn.active{background:rgba(255,255,255,.06);color:var(--text);}

/* season debut glow */
.card.season-debut{box-shadow:0 0 0 1.5px rgba(232,201,122,.6),0 0 16px rgba(232,201,122,.22);
  border-color:rgba(232,201,122,.5);}
.card.season-debut::before{opacity:1!important;background:linear-gradient(90deg,#e8c97a,#f5e0a0,#e8c97a)!important;}

/* thumbnail card layout */
.card-with-thumb{display:flex;gap:10px;margin-bottom:7px;}
.card-thumb-link{flex-shrink:0;width:110px;height:62px;border-radius:6px;overflow:hidden;
  background:var(--bg3);display:block;position:relative;}
.card-thumb-link img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .2s;}
.card-thumb-link:hover img{opacity:.85;}
.card-thumb-empty{flex-shrink:0;width:110px;height:62px;border-radius:6px;
  background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;
  justify-content:center;font-size:20px;opacity:.3;}
.card-body-wrap{flex:1;min-width:0;}
.card-body-wrap .card-top{margin-bottom:4px;}
.card-body-wrap .card-title{margin-bottom:0;font-size:11px;-webkit-line-clamp:2;}
.card-main-link{display:inline-flex;align-items:center;gap:5px;margin-top:6px;
  font-size:11px;color:var(--yejun);text-decoration:none;opacity:.85;transition:opacity .15s;}
.card-main-link:hover{opacity:1;}
.main-link-row{display:flex;align-items:center;gap:8px;background:var(--bg3);
  border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-bottom:10px;}
.main-link-display{flex:1;min-width:0;display:flex;align-items:center;gap:8px;}
.main-link-display a{font-size:12px;color:var(--yejun);text-decoration:none;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;flex:1;}
.main-link-display a:hover{text-decoration:underline;}
.main-link-edit-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);
  font-size:11px;padding:4px 9px;cursor:pointer;flex-shrink:0;transition:all .15s;white-space:nowrap;}
.main-link-edit-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2);}
.main-link-save-btn{background:rgba(77,166,255,.1);border:1px solid rgba(77,166,255,.25);border-radius:6px;
  color:var(--yejun);font-family:'Noto Sans KR',sans-serif;font-size:11px;padding:5px 11px;
  cursor:pointer;flex-shrink:0;transition:background .15s;white-space:nowrap;}
.main-link-save-btn:hover{background:rgba(77,166,255,.22);}
.main-link-del-btn{background:none;border:none;color:var(--muted);font-size:13px;
  cursor:pointer;flex-shrink:0;transition:color .15s;padding:0;}
.main-link-del-btn:hover{color:var(--eunho);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(7px);
  z-index:9999;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal-box{background:#0b0b1e;border:1px solid rgba(255,255,255,.12);border-radius:16px;
  width:100%;max-width:540px;max-height:88vh;overflow-y:auto;
  box-shadow:0 24px 80px rgba(0,0,0,.6);}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:0;position:sticky;top:0;
  background:#0b0b1e;z-index:1;border-radius:16px 16px 0 0;}
.modal-header-info{flex:1;min-width:0;}
.modal-meta{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.modal-date{font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:.12em;color:var(--muted);}
.modal-close{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);
  font-size:14px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:color .15s,border-color .15s;}
.modal-close:hover{color:var(--text);border-color:rgba(255,255,255,.2);}
.modal-main-title{font-size:13px;color:var(--text);line-height:1.45;}
.modal-body{padding:18px 22px 24px;display:flex;flex-direction:column;gap:22px;}
.section-head{font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;
  text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.tags-display{display:flex;flex-wrap:wrap;gap:5px;min-height:10px;margin-bottom:10px;}
.m-tag-del{background:none;border:none;color:inherit;opacity:.55;cursor:pointer;font-size:13px;
  padding:0;line-height:1;transition:opacity .15s;}
.m-tag-del:hover{opacity:1;}
.empty-note{font-size:11px;color:var(--muted);margin-bottom:10px;}
.m-row{display:flex;gap:8px;}
.m-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;
  padding:8px 12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:12px;outline:none;
  transition:border-color .2s;}
.m-input:focus{border-color:rgba(168,85,247,.45);}
.m-input::placeholder{color:var(--muted);}
.m-btn{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.28);border-radius:7px;
  color:var(--noah);font-family:'Noto Sans KR',sans-serif;font-size:12px;padding:8px 15px;
  cursor:pointer;white-space:nowrap;transition:background .15s;}
.m-btn:hover{background:rgba(168,85,247,.22);}
.tc-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.tc-item{display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:8px;
  padding:8px 10px;border:1px solid var(--border);cursor:grab;user-select:none;transition:opacity .15s,border-color .15s;}
.tc-item.dragging{opacity:.4;border-color:var(--noah);}
.tc-item.drag-over{border-color:rgba(168,85,247,.5);background:rgba(168,85,247,.05);}
.tc-item-num{font-family:'Syne',sans-serif;font-size:10px;color:var(--muted);min-width:16px;text-align:right;flex-shrink:0;}
.tc-item-drag{font-size:12px;color:var(--muted);flex-shrink:0;cursor:grab;opacity:.5;}
.tc-item-label{font-size:11px;color:var(--text);flex:0 0 auto;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tc-item a{flex:1;font-size:11px;color:var(--yejun);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tc-item a:hover{text-decoration:underline;}
.tc-item-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0;flex-shrink:0;transition:color .15s;}
.tc-item-del:hover{color:var(--eunho);}
.tc-tabs{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--border);margin-bottom:10px;}
.tc-tab{flex:1;background:transparent;border:none;color:var(--muted);font-family:'Noto Sans KR',sans-serif;
  font-size:11px;padding:7px;cursor:pointer;transition:all .15s;}
.tc-tab.active{background:rgba(255,255,255,.06);color:var(--text);}
.tc-tab:not(:last-child){border-right:1px solid var(--border);}
.tc-pane{display:flex;flex-direction:column;gap:7px;}
.tc-preview-box{font-size:11px;color:var(--noah);word-break:break-all;padding:7px 11px;
  background:rgba(168,85,247,.06);border-radius:7px;border:1px solid rgba(168,85,247,.16);}

.empty{text-align:center;padding:56px 20px;color:var(--muted);font-size:13px;}
.empty-icon{font-size:34px;margin-bottom:10px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px;}

@media(max-width:600px){
  .grid{grid-template-columns:1fr;}
  .filter-divider{display:none;}
  .tab-btn{padding:11px 12px;font-size:10px;}
  .modal-box{max-height:92vh;}
  .m-row{flex-direction:column;}
}
/* ── 발매곡 ── */
.btn-song-album.active{background:var(--ac,rgba(168,85,247,.18));border-color:var(--bc,rgba(168,85,247,.5));color:var(--tc,#c084fc);}
.btn-song-year.active,.btn-song-type.active{background:rgba(45,212,191,.12);border-color:rgba(45,212,191,.35);color:#2dd4bf;}
.songs-album-section{margin-bottom:22px;}
.songs-album-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.songs-album-label{font-size:12px;font-weight:700;letter-spacing:.06em;padding:3px 10px;border-radius:5px;border-left:3px solid;}
.songs-album-date{font-size:10px;color:var(--muted);}
.songs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
.song-card{background:#0f0f1e;border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .15s;}
.song-card:hover{border-color:rgba(255,255,255,.2);}
.song-thumb-wrap{width:100%;aspect-ratio:1;position:relative;overflow:hidden;background:#111;}
.song-thumb-blur{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(16px);opacity:.6;transform:scale(1.15);}
.song-thumb-img{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.song-thumb-img img{width:100%;height:100%;object-fit:cover;}
.song-thumb-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;}
.song-top-badges{position:absolute;top:5px;left:5px;display:flex;gap:3px;flex-wrap:wrap;}
.song-link-icon{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.6);color:#aaa;padding:2px 5px;border-radius:4px;font-size:10px;}
.song-body{padding:8px 9px;}
.song-title-text{color:#eee;font-size:11px;font-weight:700;margin-bottom:3px;line-height:1.3;word-break:keep-all;overflow-wrap:break-word;}
.song-meta-mini{color:#555;font-size:9px;line-height:1.5;}
.song-badge{padding:2px 5px;border-radius:4px;font-size:9px;font-weight:700;}
.sb-title{background:rgba(168,85,247,.9);color:#f0e6ff;}
.sb-track{background:rgba(77,166,255,.8);color:#dff0ff;}
.sb-ost{background:rgba(45,212,191,.75);color:#003d35;}
.sb-inst{background:rgba(255,183,77,.75);color:#3d2000;}
/* 모달 */
.song-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:none;align-items:center;justify-content:center;}
.song-modal-box{background:#0f0f1e;border:1px solid rgba(255,255,255,.12);border-radius:12px;overflow:hidden;display:flex;width:min(500px,95vw);max-height:90vh;}
.song-modal-left{width:180px;height:180px;flex-shrink:0;position:relative;overflow:hidden;background:#111;cursor:pointer;}
.song-modal-left:hover .song-modal-hover{opacity:1;}
.song-modal-hover{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:11px;color:#fff;font-weight:600;}
.song-modal-right{flex:1;padding:14px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
.song-modal-badges{display:flex;gap:4px;flex-wrap:wrap;}
.song-modal-title{color:#eee;font-size:13px;font-weight:700;}
.song-modal-sub{color:#a78bfa;font-size:9px;}
.song-modal-divider{border:none;border-top:1px solid rgba(255,255,255,.06);}
.song-modal-mk{color:#444;font-size:9px;width:36px;flex-shrink:0;}
.song-modal-mv{color:#999;font-size:10px;}
.song-tag-label{color:#555;font-size:9px;display:flex;align-items:center;gap:4px;}
.song-tag-list{display:flex;flex-wrap:wrap;gap:3px;min-height:14px;}
.song-tag{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#888;padding:2px 7px;border-radius:20px;font-size:9px;cursor:pointer;}
.song-tag:hover{border-color:rgba(255,82,82,.4);color:#ff5252;}
.song-tag-empty{color:#333;font-size:9px;}
.song-tag-input-wrap{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:5px;padding:4px 8px;}
.song-tag-input{background:transparent;border:none;color:#888;font-size:10px;outline:none;width:100%;}
.song-tag-input::placeholder{color:#333;}
@media(max-width:600px){
  .songs-grid{grid-template-columns:repeat(2,1fr);}
  .song-modal-box{flex-direction:column;}
  .song-modal-left{width:100%;height:160px;}
}
/* ── 그라데이션 테두리 (로고 컬러) ── */
/* ── 방송 타입 버튼 ── */
.btn-bcast{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:var(--muted);font-size:11px;font-weight:600;font-family:'Noto Sans KR',sans-serif;padding:5px 12px;cursor:pointer;transition:all .15s;}
.btn-bcast.active{background:rgba(77,166,255,.12);border-color:rgba(77,166,255,.4);color:#4da6ff;}
.btn-bcast[data-bcast="radio"].active{background:rgba(168,85,247,.12);border-color:rgba(168,85,247,.4);color:#a855f7;}
.btn-bcast[data-bcast="lassgo"].active{background:rgba(255,183,77,.12);border-color:rgba(255,183,77,.4);color:#ffb74d;}
#search-mode-btn.title-only{border-color:rgba(255,255,255,.8) !important;color:#ffffff !important;background:transparent !important;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--muted);font-size:13px;gap:8px;}
.empty-icon{display:none;}
</style>
<body>

<header>
  <div class="logo-title">PLAVE ARCHIVE</div>
  <div class="logo-sub">라이브 방송 · 라디오 아카이브</div>
</header>

<div class="tab-bar">
  <div class="tab-row">
    <div style="display:flex;">
      <button class="tab-btn active" onclick="switchTab('broadcast',this)">🛸 방송</button>
      <button class="tab-btn" onclick="switchTab('songs',this)">💿 발매곡</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <!-- 백업하기 (태그 + 수기 추가 통합) -->
      <div style="position:relative;display:inline-flex;flex-direction:column;gap:2px;">
        <button class="btn-add-live" id="tag-backup-btn" onclick="backupAll()" title="태그 및 수기 추가 방송 백업">💾 백업하기</button>
        <div id="tag-backup-bar" style="display:none;height:3px;border-radius:2px;background:rgba(45,212,191,.2);overflow:hidden;">
          <div id="tag-backup-fill" style="height:100%;background:#2dd4bf;width:0%;transition:width .3s;"></div>
        </div>
      </div>
      <button class="btn-add-live" onclick="openAddLive()" title="새 방송 추가" style="padding:5px 10px;font-size:16px;">＋</button>
    </div>
  </div>
</div>

<!-- 연동하기 고정 바 (최상단 단독) -->
<div id="sync-fixed-bar" style="position:fixed;top:0;right:0;left:0;z-index:999;display:flex;justify-content:flex-end;align-items:center;gap:12px;padding:6px 16px;background:rgba(11,11,30,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);">
  <span id="sync-status" style="font-size:10px;font-weight:400;color:rgba(255,255,255,.35);font-family:'Noto Sans KR',sans-serif;"></span>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;min-width:100px;">
    <button id="sync-btn" onclick="syncAll()"
      style="background:rgba(232,201,122,.15);border:1px solid rgba(232,201,122,.4);border-radius:7px;
             color:#e8c97a;font-size:11px;font-weight:600;padding:5px 14px;cursor:pointer;
             font-family:'Syne',sans-serif;letter-spacing:.06em;white-space:nowrap;transition:background .15s;"
      onmouseover="this.style.background='rgba(232,201,122,.28)'"
      onmouseout="this.style.background='rgba(232,201,122,.15)'">🔄 연동하기</button>
    <div id="sync-bar" style="display:none;width:100%;height:3px;border-radius:2px;background:rgba(232,201,122,.2);overflow:hidden;">
      <div id="sync-fill" style="height:100%;background:#e8c97a;width:0%;transition:width .3s;"></div>
    </div>
  </div>
</div>


<!-- ── ADD LIVE MODAL ── -->
<div class="modal-overlay" id="add-live-modal" onclick="closeAddLive()" style="display:none;">
  <div class="modal-box" onclick="event.stopPropagation()" style="max-width:500px;">
    <div class="modal-header" style="padding:16px 20px 12px;">
      <div class="modal-header-info">
        <div class="modal-main-title" style="font-size:15px;">＋ 새 라이브 방송 추가</div>
      </div>
      <button class="modal-close" onclick="closeAddLive()">✕</button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:12px;">

      <!-- URL 먼저 -->
      <div>
        <div style="font-size:10px;color:var(--muted);margin-bottom:5px;">YouTube URL 붙여넣기 → 제목·썸네일 자동 추출</div>
        <div style="display:flex;gap:7px;">
          <input class="m-input" id="al-url" placeholder="https://www.youtube.com/live/..." style="flex:1;"
            oninput="onAlUrlInput()">
          <button class="m-btn" id="al-fetch-btn" onclick="fetchAlMeta()" style="flex-shrink:0;min-width:60px;">불러오기</button>
        </div>
      </div>

      <!-- 썸네일 미리보기 + 제목 -->
      <div id="al-preview" style="display:none;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:10px;display:none;gap:10px;align-items:flex-start;flex-direction:row;">
        <img id="al-thumb-preview" src="" style="width:100px;height:56px;object-fit:cover;border-radius:6px;flex-shrink:0;" alt="">
        <div style="flex:1;min-width:0;">
          <div style="font-size:10px;color:var(--muted);margin-bottom:4px;">제목 (수정 가능)</div>
          <input class="m-input" id="al-title" placeholder="제목" style="width:100%;font-size:12px;">
        </div>
      </div>

      <!-- 제목만 (미리보기 없을 때) -->
      <div id="al-title-only" style="">
        <div style="font-size:10px;color:var(--muted);margin-bottom:4px;">제목 *</div>
        <input class="m-input" id="al-title-2" placeholder="방송 제목 입력..." style="width:100%;" oninput="updateAlPreview()">
      </div>

      <!-- 날짜 -->
      <div>
        <div style="font-size:10px;color:var(--muted);margin-bottom:4px;">날짜 *</div>
        <input type="date" class="m-input" id="al-date" style="width:160px;color-scheme:dark;" oninput="updateAlPreview()">
      </div>

      <!-- 멤버 -->
      <div>
        <div style="font-size:10px;color:var(--muted);margin-bottom:6px;">멤버 * (복수 선택)</div>
        <div id="al-members" style="display:flex;gap:5px;flex-wrap:wrap;">
          <button class="btn btn-all active" data-m="전원" onclick="toggleAlMem(this)">전원</button>
          <button class="btn btn-yejun" data-m="예준" onclick="toggleAlMem(this)">💙 예준</button>
          <button class="btn btn-noah" data-m="노아" onclick="toggleAlMem(this)">💜 노아</button>
          <button class="btn btn-bambi" data-m="밤비" onclick="toggleAlMem(this)">🩷 밤비</button>
          <button class="btn btn-eunho" data-m="은호" onclick="toggleAlMem(this)">❤️ 은호</button>
          <button class="btn btn-hamin" data-m="하민" onclick="toggleAlMem(this)">🖤 하민</button>
        </div>
      </div>

      <!-- 자동 분류 미리보기 -->
      <div id="al-preview" style="display:none;background:rgba(45,212,191,.05);border:1px solid rgba(45,212,191,.2);
           border-radius:8px;padding:8px 12px;font-size:11px;color:var(--muted);">
        <span style="color:#2dd4bf;font-weight:600;margin-right:6px;">자동 분류</span>
        <span id="al-preview-text"></span>
      </div>

      <button onclick="submitAddLive()"
        style="background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.35);border-radius:8px;
               color:var(--noah);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;
               padding:10px;cursor:pointer;transition:background .15s;"
        onmouseover="this.style.background='rgba(168,85,247,.28)'"
        onmouseout="this.style.background='rgba(168,85,247,.15)'">
        추가하기
      </button>
    </div>
  </div>
</div>

<div class="controls">
  <div class="controls-inner" id="main-filters-wrap">

    <!-- 검색 한 줄 -->
    <div class="filter-row-labeled" style="align-items:center;">
      <button id="search-mode-btn" onclick="toggleSearchMode()"
        style="flex-shrink:0;background:transparent;border:1px solid rgba(255,255,255,.12);
               border-radius:8px;color:rgba(255,255,255,.3);
               font-size:11px;font-weight:600;padding:4px 11px;cursor:pointer;
               white-space:nowrap;transition:all .15s;font-family:'Noto Sans KR',sans-serif;">검색</button>
      <div style="width:1px;height:18px;background:rgba(255,255,255,.1);flex-shrink:0;"></div>
      <div class="search-row" style="flex:1;position:relative;display:flex;align-items:center;">
        <input class="search-input" id="search" type="text" placeholder="검색어 입력 후 Enter"
          oninput="document.getElementById('search-clear').style.display=this.value?'flex':'none';"
          onkeydown="if(event.key==='Enter'){render();}">
        <button id="search-clear" onclick="document.getElementById('search').value='';curQ='';render();this.style.display='none';"
          style="display:none;position:absolute;right:36px;background:none;border:none;cursor:pointer;
                 font-size:13px;padding:0 4px;line-height:1;color:var(--muted);align-items:center;justify-content:center;">✕</button>
        <button onclick="render()"
          style="position:absolute;right:8px;background:none;border:none;cursor:pointer;
                 font-size:16px;padding:0;line-height:1;color:var(--muted);">🔍</button>
      </div>

<script>
/* ── helpers ── */
/* ── YouTube ID 추출 helper ── */
function ytThumb(url){
  if(!url) return "";
  const m=(url||"").match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|live\/|embed\/|v\/))([a-zA-Z0-9_-]{11})/);
  return m?`https://i.ytimg.com/vi/${m[1]}/mqdefault.jpg`:"";
}
const MC={예준:"yejun",노아:"noah",밤비:"bambi",은호:"eunho",하민:"hamin",전원:"all"};
const ME={예준:"💙",노아:"💜",밤비:"🩷",은호:"❤️",하민:"🖤",전원:"✨"};
const TGK={a:"tagsA",b:"tagsB",c:"tagsC"};
const pc=m=>"pill-"+(MC[m]||"all");
const pills=arr=>arr.map(m=>`<span class="member-pill ${pc(m)}">${ME[m]||""} ${m}</span>`).join("");
function cc(arr){
  if(!arr||!arr.length)return"c-mixed";
  if(arr.includes("전원"))return"c-all";
  if(arr.length===1)return"c-"+(MC[arr[0]]||"mixed");
  return"c-mixed";
}
const matchM=(arr)=>{
  if(curMemSet.has("all")||curMemSet.size===0)return true;
  if(arr.includes("전원")) return false;
  if(arr.length!==curMemSet.size)return false;
  return arr.every(m=>curMemSet.has(m));
};

// Birthday dates (MM.DD) and milestone title patterns
const BDAY_DATES=new Set(["02.10","03.12","05.24","06.19","07.15","09.12","11.01"]);
const MILESTONE_RE=/100일|1000일|100회|200회|300회|회 특집/;
// gviz CSV는 "11.10" → "11.1" (trailing zero 제거)로 내보냄
// 일(day)이 1자리면 오른쪽에 0 붙여서 복원: "11.1" → "11.10"
function normD(d){
  if(!d) return d;
  const p=d.split(".");
  if(p.length!==2) return d;
  const mo=p[0].padStart(2,"0");
  const day=p[1].length===1 ? p[1]+"0" : p[1].padStart(2,"0");
  return mo+"."+day;
}
function isSpecialBday(d,t){
  return BDAY_DATES.has(normD(d))||(t&&t.includes("생일"));
}
function isSpecialMilestone(d,t){return !isSpecialBday(d,t)&&MILESTONE_RE.test(t);}
function matchSpecial(d,t){
  if(curSpecial==="all")return true;
  if(curSpecial==="bday")return isSpecialBday(d,t);
  if(curSpecial==="milestone")return isSpecialMilestone(d,t);
  return true;
}

function toNum(y, d){ // d = "MM.DD"
  const [mm,dd]=d.split(".").map(Number);
  return y*10000+mm*100+dd;
}

function matchEra(y, d){
  if(curEra==="all")return true;
  if(curEra==="comeback") return SEASON_DATES.has(toNum(y,d));
  const era=ERAS[curEra];
  if(!era)return true;
  const n=toNum(y,d);
  if(curTagMode==="exact"){
    // 일치: must be within this era AND not leak into adjacent era
    return n>=era.from&&n<=era.to;
  }
  // 포함: same — era is already a tight range
  return n>=era.from&&n<=era.to;
}

/* YouTube builder */
function extractYTId(u){
  const m=u.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
  if(m)return m[1];
  if(/^[a-zA-Z0-9_-]{11}$/.test(u))return u;
  return null;
}

// Accepts: "023456" → 02:34:56, "2345" → 00:23:45, "45" → 00:00:45
// Also accepts "1:23:45", "23:45"
function parseTime(s){
  s=s.trim();
  if(!s)return null;
  // colon format
  if(s.includes(":")){
    const p=s.split(":").map(Number);
    if(p.some(isNaN))return null;
    if(p.length===3)return p[0]*3600+p[1]*60+p[2];
    if(p.length===2)return p[0]*60+p[1];
    return null;
  }
  // digit-only: pad to multiple of 2 from left
  const digits=s.replace(/\D/g,"");
  if(!digits)return null;
  const padded=digits.padStart(6,"0");
  const h=parseInt(padded.slice(0,2),10);
  const m2=parseInt(padded.slice(2,4),10);
  const sec=parseInt(padded.slice(4,6),10);
  if(m2>59||sec>59)return null;
  return h*3600+m2*60+sec;
}

function formatTimeDisplay(s){
  const sec=parseTime(s);
  if(sec===null)return s;
  const h=Math.floor(sec/3600),m2=Math.floor((sec%3600)/60),s2=sec%60;
  return h>0?`${String(h).padStart(2,"0")}:${String(m2).padStart(2,"0")}:${String(s2).padStart(2,"0")}`
           :`${String(m2).padStart(2,"0")}:${String(s2).padStart(2,"0")}`;
}

function onYTTimeInput(el){
  // Only allow digits and colons
  el.value=el.value.replace(/[^\d:]/g,"");
  previewYT();
}

function buildYT(){
  // Use the main video URL of the current card instead of a separate URL field
  const baseUrl=getVideoUrl(mId);
  if(!baseUrl||!baseUrl.trim())return null;
  const rawTime=document.getElementById("tc-yt-time").value.trim();
  const sec=parseTime(rawTime);
  if(sec===null)return null;
  // append &t=Ns (or ?t=Ns if no query string yet)
  const sep=baseUrl.includes("?")?"&":"?";
  return baseUrl+sep+"t="+sec+"s";
}
function previewYT(){
  const rawTime=document.getElementById("tc-yt-time").value.trim();
  const url=buildYT();
  const el=document.getElementById("tc-yt-preview");
  if(url){

    el.innerHTML=`<span style="color:var(--muted)">${lbl||disp} →</span> ${escH(url)}`;

}

      document.querySelectorAll("#tg-filter-a,#tg-filter-b,#tg-filter-c").forEach(b=>b.classList.add("active"));
    } else {
      curTGSet.delete(t);btn.classList.remove("active");
      curTGFilter=curTGSet.size===3?"all":[...curTGSet].join(",");
    }
  } else {
    curTGSet.add(t);btn.classList.add("active");
    curTGFilter=curTGSet.size===3?"all":[...curTGSet].join(",");
  }
  render();
}

// matchTag: searches across groups or specific group based on curTGFilter
function matchTag(sid){
  if(!curTagQ)return true;
  const d=getData(sid);
  const q2=curTagQ.toLowerCase();
  // which groups to search
  const groups=curTGFilter==="all"?["a","b","c"]:[curTGFilter];
  const allTagsInScope=groups.flatMap(g=>d[TGK[g]]||[]);
  if(!allTagsInScope.length)return false;
  if(curTagMode==="exact") return allTagsInScope.some(t=>t.toLowerCase()===q2);
  return allTagsInScope.some(t=>t.toLowerCase().includes(q2));
}

function escH(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}

function thumbErr(imgEl){
  const cur=imgEl.src||"";
  const vid=cur.match(/\/vi\/([^/]+)\//);
  if(vid&&!imgEl.dataset.tried){
    imgEl.dataset.tried="1";
    imgEl.src="https://i.ytimg.com/vi/"+vid[1]+"/hqdefault.jpg";
  } else {
    // 카드 썸네일 숨기기
    const wrap=imgEl.closest?imgEl.closest(".card-thumb-link"):null;
    if(wrap) wrap.style.display="none";
    // 모달 썸네일 숨기기
    if(imgEl.id==="m-thumb-img"){
      const mWrap=document.getElementById("m-thumb-wrap");
      if(mWrap) mWrap.style.display="none";
    }
  }
}
window.thumbErr=thumbErr;

function tryLoadThumb(imgEl, url){
  if(!url||!imgEl)return;
  imgEl.removeAttribute("data-tried");
  imgEl.onerror=function(){thumbErr(imgEl);};
  imgEl.src=url;
}

/* CSV 파싱 (따옴표·쉼표 처리) */
function parseCSV(text){
  const lines = text.trim().split(/\r?\n/);
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = "", inQ = false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){ inQ=!inQ; continue; }
      if(c===','&&!inQ){ cols.push(cur.trim()); cur=""; continue; }
      cur+=c;
    }
    cols.push(cur.trim());
    return cols;
  }).filter(r=>r.length>1&&r.some(c=>c));
}

/* CSV → L[] 형식 변환
   컬럼: 연도, 날짜(MM.DD), 제목, 멤버, YouTube_URL, 썸네일_URL */
function csvToLive(rows){
  return rows.map(r=>{
    // 시트 컬럼: sid(0) 연도(1) 날짜(2) 제목(3) 멤버(4) YouTube_URL(5) 썸네일_URL(6)
    const [sid,y,d,t,m,url,thumb] = r;
    if(!y||!d||!t) return null;
    const members = m ? m.split(/[,，、]/).map(s=>s.trim()).filter(Boolean) : ["전원"];
    const entry = {sid:sid||"", y:+y, d, t, m:members, url:url||"", thumb:thumb||""};
    if(url&&!thumb){
      const vid = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|live\/|embed\/))([a-zA-Z0-9_-]{11})/);
      if(vid) entry.thumb = `https://i.ytimg.com/vi/${vid[1]}/mqdefault.jpg`;
    }
    return entry;
  }).filter(Boolean);
}

/* CSV → R[] 형식 변환
   컬럼: sid(0) 연도(1) 날짜(2) DJ(3) 게스트(4) YouTube_URL(5) 썸네일_URL(6) */

            if(existing){

    if(cfg.tags){
      st("태그 불러오는 중");

              tagsB: (existing.tagsB&&existing.tagsB.length)?existing.tagsB:safeParseArr(tagsB),

/* helpers for built-in URL/thumb */
/* ── SID 생성 (날짜 기반, 같은 날 N번째) ── */
function makeSid(type, y, d, t){
  const nd=normD(d||"");
  const dateKey=`${y}${nd.replace(".","")}`; // YYYYMMDD
  if(type==="live"){
    // 같은 날 방송이 여러 개면 L[]에서 몇 번째인지 계산
    const sameDay=L.filter(b=>b.y===y&&b.d===d);
    const entry=L.find(b=>b.y===y&&b.d===d&&b.t===t);
    const n=sameDay.indexOf(entry);
    return`live_${dateKey}_${n<0?0:n}`;
  }
  if(type==="radio"){
    const sameDay=R.filter(r=>r.y===y&&r.d===d);
    const n=sameDay.findIndex(r=>r.dj.join("")===t);
    return`radio_${dateKey}_${n<0?0:n}`;
  }
  if(type==="lassgo"){
    const sameDay=P.filter(p=>p.y===y&&p.d===d);
    const entry=P.find(p=>p.y===y&&p.d===d&&p.t===t);
    const n=sameDay.indexOf(entry);
    return`lassgo_${dateKey}_${n<0?0:n}`;
  }
  return`${type}_${dateKey}_0`;
}

function getLiveIdx(sid){
  // 신규 형식: live_YYYYMMDD_N
  const m2=sid.match(/^live_(\d{4})(\d{2})(\d{2})_(\d+)$/);
  if(m2){
    const [,y,mo,dd,n]=[...m2];
    const dPad=`${mo}.${dd}`;           // "03.26"
    const dNoPad=`${+mo}.${+dd}`;       // "3.26"
    const sameDay=L.filter(b=>b.y===+y&&(b.d===dPad||b.d===dNoPad));
    const entry=sameDay[+n];
    return entry?L.indexOf(entry):-1;
  }
  // 구형 형식: live_숫자 (하위호환)
  const m=sid.match(/^live_(\d+)$/);return m?+m[1]:-1;
}
function getDefaultUrl(sid){
  const i=getLiveIdx(sid);
  return(i>=0&&i<L.length)?L[i].url||"":" ";
}
function getThumbUrl(sid){
  const i=getLiveIdx(sid);
  if(i<0||i>=L.length)return"";
  if(L[i].thumb)return L[i].thumb;
  const url=L[i].url||"";
  const vid=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|live\/|embed\/))([a-zA-Z0-9_-]{11})/);
  if(vid){const t=`https://i.ytimg.com/vi/${vid[1]}/mqdefault.jpg`;L[i].thumb=t;return t;}
  return"";
}
function getVideoUrl(sid){const d=getData(sid);return d.videoUrl||getDefaultUrl(sid);}

  // also save videoUrl to the sid slot (will be a custom_ id)
  closeAddLive();
  // inject into L and re-render
  L.push(entry);
  if(url){
    const sid=`live_${L.length-1}`;
    const raw=JSON.parse(localStorage.getItem("plave_v2_"+sid)||"{}");
    if(!raw.videoUrl){raw.videoUrl=url;localStorage.setItem("plave_v2_"+sid,JSON.stringify(raw));}
  }
  render();
  // switch to live tab
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.querySelector(".tab-btn").classList.add("active");
  curTab="live";
  document.querySelectorAll(".section-view").forEach(v=>v.classList.remove("active"));
  document.getElementById("view-broadcast").classList.add("active");
  render();
  alert(`✅ "${title}" 추가됐어요!\n⚠️ 새로고침하면 사라지니, 다음에도 쓰려면 엑셀로 전달해주세요.`);
}

let filtersOpen=true;
function toggleFilters(forceClose){
  const el=document.getElementById("filters-collapsible");
  const arrow=document.getElementById("filter-toggle-arrow");
  if(!el||!arrow) return;
  if(forceClose===true||(forceClose===undefined&&filtersOpen)){
    el.classList.add("collapsing");

      setTimeout(()=>el.classList.remove("collapsing"),180);
    });
    arrow.textContent="▼";
    filtersOpen=false;
  } else {

    el.classList.remove("collapsing");
    setTimeout(()=>{el.classList.remove("expanding");updateEraRowSeps();},180);
    arrow.textContent="▲";
    filtersOpen=true;
  }
  setTimeout(updateStickyOffsets,220);
}

function updateStickyOffsets(){
  const fixedBar=document.getElementById("sync-fixed-bar");
  const fixedH=fixedBar?fixedBar.getBoundingClientRect().height:44;
  const header=document.querySelector("header");
  const tabBar=document.querySelector(".tab-bar");
  const ctrl=document.querySelector(".controls");
  if(header){header.style.top=fixedH+"px";}
  const headerH=header?header.getBoundingClientRect().height:0;
  if(tabBar){tabBar.style.top=(fixedH+headerH)+"px";}
  const tabH=tabBar?tabBar.getBoundingClientRect().height:0;
  if(ctrl){ctrl.style.top=(fixedH+headerH+tabH)+"px";}
  const sf=document.getElementById("songs-filter");
  if(sf&&sf.style.position==="sticky"){sf.style.top=(fixedH+headerH+tabH)+"px";}
}
window.addEventListener("load",updateStickyOffsets);
window.addEventListener("resize",()=>{updateStickyOffsets();updateEraRowSeps();});

function updateEraRowSeps(){
  const wrap=document.getElementById("era-filters");
  if(!wrap)return;
  // 기존 구분선 제거
  wrap.querySelectorAll(".era-row-sep").forEach(el=>el.remove());
  // wrap 상태가 아니면(한 줄) 종료
  const style=getComputedStyle(wrap);
  if(style.flexWrap==="nowrap")return;
  // 버튼들의 offsetTop 비교해서 줄 바뀌는 지점에 구분선 삽입
  const btns=[...wrap.querySelectorAll(".btn")];
  let lastTop=null;
  btns.forEach(btn=>{
    const top=btn.offsetTop;
    if(lastTop!==null&&top>lastTop){
      const sep=document.createElement("div");
      sep.className="era-row-sep";
      wrap.insertBefore(sep,btn);
    }
    lastTop=top;
  });
}

function setMember(btn){
  const m=btn.dataset.member;
  const allBtn=document.querySelector("#member-filters .btn[data-member='all']");
  const memberBtns=[...document.querySelectorAll("#member-filters .btn:not([data-member='all'])")];

  if(m==="all"){
    if(curMemSet.has("all")){
      // 전원 활성 → 전부 미선택
      curMemSet=new Set();
      allBtn.classList.remove("active");
      memberBtns.forEach(b=>b.classList.remove("active"));
    } else {
      // 전원 미선택 → 전부 활성
      curMemSet=new Set(["all"]);
      allBtn.classList.add("active");
      memberBtns.forEach(b=>b.classList.add("active"));
    }
  } else {
    // 개별 멤버 클릭
    const wasAll=curMemSet.has("all");
    if(wasAll){
      // 전원 상태에서 하나 해제 → 전원 미선택 + 해당 멤버 미선택 (4명 active)
      curMemSet=new Set(["예준","노아","밤비","은호","하민"]);
      curMemSet.delete(m);
      allBtn.classList.remove("active");
      memberBtns.forEach(b=>{
        if(b.dataset.member===m) b.classList.remove("active");
        else b.classList.add("active");
      });
    } else {
      // 일반 토글
      allBtn.classList.remove("active");
      if(curMemSet.has(m)){
        curMemSet.delete(m);
        btn.classList.remove("active");
      } else {
        curMemSet.add(m);
        btn.classList.add("active");
      }
      if(curMemSet.size===0){
        allBtn.classList.remove("active");
        memberBtns.forEach(b=>b.classList.remove("active"));
      }
      if(["예준","노아","밤비","은호","하민"].every(x=>curMemSet.has(x))){
        curMemSet=new Set(["all"]);
        allBtn.classList.add("active");
        memberBtns.forEach(b=>b.classList.add("active"));
      }
    }
  }
  render();
}

function matchTitleOrTags(t, sid){
  if(!curQ)return true;
  const q2=curQ.toLowerCase();
  const tl=t.toLowerCase();
  if(curTagMode==="exact"){
    if(tl===q2)return true;
  } else {
    if(tl.includes(q2))return true;
  }
  // also search tags A/B/C
  const d=getData(sid);
  const allTags=[...d.tagsA,...d.tagsB,...d.tagsC];
  return allTags.some(tag=>tag.toLowerCase().includes(q2));
}
function matchYear(y){
  if(curEra!=="all") return true; // 시즌 선택 시 연도 필터 무시
  if(curYearSet.size===0) return true;
  return curYearSet.has(String(y));
}

    if(!curMemSet.has("all")){
      const allPeople=[...r.dj,...r.g];
      const hit=allPeople.some(p=>curMemSet.has(p));
      if(!hit)return false;
    }
    // 특별게스트 필터: g[]에 멤버 외 이름이 있는 것만
    if(curSpecialGuest){
      if(!r.g.some(g=>!MEMBERS.has(g)))return false;
    }
    if(curQ){
      const sid=makeSid("radio",r.y,r.d,r.dj.join(""));
      const s=r.dj.join(" ")+" "+r.g.join(" ")+" "+r.y+"."+r.d;

  if(curBcastSet.has(t)){
    if(curBcastSet.size===1){
      curBcastSet=new Set(["live"]);curBcastAllActive=false;
      document.querySelectorAll(".btn-bcast").forEach(b=>b.classList.toggle("active",b.dataset.bcast==="live"));
    } else {
      curBcastSet.delete(t);btn.classList.remove("active");
      curBcastAllActive=curBcastSet.size===3;
    }
  } else {
    curBcastSet.add(t);btn.classList.add("active");
    curBcastAllActive=curBcastSet.size===3;
  }
  render();
}

function getSid(type,item){
  if(item.sid) return item.sid;
  const dateKey=`${item.y}${(item.d||"").replace(".","").padStart(4,"0")}`;
  return`${type}_${dateKey}_0`;
}

function renderUnifiedCard(item,yy){
  const type=item._type;
  const sid=getSid(type,item);
  const vurl=item.url||getVideoUrl(sid)||"";
  let thumb=item.thumb||"";
  if(!thumb&&vurl){
    const v=vurl.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|live\/|embed\/))([a-zA-Z0-9_-]{11})/);
    if(v) thumb=`https://i.ytimg.com/vi/${v[1]}/mqdefault.jpg`;
  }
  const thumbHtml=thumb
    ?`<a class="card-thumb-link" href="${escH(vurl||'#')}" target="_blank" onclick="event.stopPropagation()"><img src="${escH(thumb)}" onerror="window.thumbErr&&window.thumbErr(this)" alt="" style="width:100%;height:100%;object-fit:cover;display:block;"></a>`
    :`<div class="card-thumb-empty">${type==="radio"?"📻":type==="lassgo"?"🚀":"📺"}</div>`;
  let badge="",title="",memberPills="";
  if(type==="live"){
    badge=`<span class="badge badge-type-live">📺 라이브</span>`;
    title=item.t||"";
    memberPills=(item.m||[]).map(m=>`<span class="member-pill ${pc(m)}">${ME[m]||""} ${m}</span>`).join("");
  } else if(type==="radio"){
    badge=`<span class="badge badge-type-radio">📻 라디오</span>`;
    title=`DJ ${(item.dj||[]).join("·")}${(item.g||[]).length?` · 게스트 ${item.g.join("·")}`:""}`;
    memberPills=[...(item.dj||[]),...(item.g||[])].map(m=>`<span class="member-pill ${pc(m)}">${ME[m]||""} ${m}</span>`).join("");
  } else {
    badge=`<span class="badge badge-type-lassgo">🚀 라쓰고</span>`;
    title=item.t||"";
    memberPills="";
  }
  const colorClass=type==="live"?cc(item.m||[]):type==="radio"?cc(item.dj||[]):"c-all";
  return`<div class="card ${colorClass}" data-sid="${escH(sid)}" data-title="${escH(title)}" data-date="${yy}.${item.d}" data-type="${type}" onclick="if(!event.target.closest('a,button'))handleCardClick(this)">
    <div class="card-with-thumb">
      ${thumbHtml}
      <div class="card-body-wrap">
        <div class="card-top">
          <span class="card-date">${yy}.${normD(item.d)}</span>
          <div class="card-badges">${badge}${vurl?'<span class="badge" style="background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);color:var(--muted);">🔗</span>':''}</div>
        </div>
        <div class="card-title">${escH(title)}</div>
        ${memberPills?`<div class="card-pills">${memberPills}</div>`:""}
        <span class="card-edit-hint">✏ 편집</span>
      </div>
    </div>
  </div>`;
}

function renderUnified(){
  const el=document.getElementById("live-content");
  const radioEl=document.getElementById("radio-content");
  const lassgoEl=document.getElementById("lassgo-content");
  if(radioEl) radioEl.innerHTML="";
  if(lassgoEl) lassgoEl.innerHTML="";
  if(!el) return;
  const typeOrder={live:0,radio:1,lassgo:2};
  let items=[];
  if(curBcastSet.has("live")) L.filter(b=>{
    if(!matchYear(b.y))return false;
    if(!matchEra(b.y,b.d))return false;
    if(!matchM(b.m))return false;
    if(!matchSpecial(b.d,b.t))return false;
    if(!matchTitleOrTags(b.t,getSid("live",b)))return false;
    if(curTagQ&&!matchTag(getSid("live",b)))return false;
    return true;
  }).forEach(b=>items.push({...b,_type:"live",sid:makeSid("live",b.y,b.d,b.t)}));
  if(curBcastSet.has("radio")) R.filter(r=>{
    if(!matchYear(r.y))return false;
    const members=[...(r.dj||[]),...(r.g||[])];
    if(curMemSet.size>0&&!curMemSet.has("all")&&!members.some(m=>curMemSet.has(m)))return false;
    return true;
  }).forEach(r=>items.push({...r,_type:"radio",sid:makeSid("radio",r.y,r.d,r.dj.join(""))}));
  if(curBcastSet.has("lassgo")) P.filter(p=>{
    if(!matchYear(p.y))return false;
    if(!matchTitleOrTags(p.t,getSid("lassgo",p)))return false;
    if(curTagQ&&!matchTag(getSid("lassgo",p)))return false;
    return true;
  }).forEach(p=>items.push({...p,_type:"lassgo",sid:makeSid("lassgo",p.y,p.d,p.t)}));

  items.sort((a,b)=>{
    const da=`${a.y}${(a.d||"").replace(".","").padStart(4,"0")}`;
    const db=`${b.y}${(b.d||"").replace(".","").padStart(4,"0")}`;
    if(da!==db) return curSort==="desc"?(db>da?1:-1):(da>db?1:-1);
    return typeOrder[a._type]-typeOrder[b._type];
  });

  document.getElementById("result-count").textContent=`총 ${items.length}개`;
  if(!items.length){el.innerHTML='<div class="empty">검색 결과가 없어요</div>';return;}

  const MON=["","1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const byY={};
  items.forEach(item=>{
    if(!byY[item.y]) byY[item.y]={};
    const mo=+item.d.split(".")[0];
    if(!byY[item.y][mo]) byY[item.y][mo]=[];
    byY[item.y][mo].push(item);
  });
  const sortedYears=Object.keys(byY).map(Number).sort((a,b)=>curSort==="desc"?b-a:a-b);
  el.innerHTML=sortedYears.map(yy=>{
    const months=Object.keys(byY[yy]).map(Number).sort((a,b)=>curSort==="desc"?b-a:a-b);
    return`<div class="year-group">
      <div class="year-header"><span class="year-label">${yy}</span></div>
      ${months.map(mo=>`<div class="month-group">
        <div class="month-header"><span class="month-label">${MON[mo]}</span></div>
        <div class="grid">${byY[yy][mo].map(item=>renderUnifiedCard(item,yy)).join("")}</div>
      </div>`).join("")}
    </div>`;
  }).join("");
}

  ["오늘 밤","이밤빌"],["이 밤","이밤빌"],
];

function getSongEra(album,title){
  const s=album+" "+title;
  for(const [k,era] of SONG_ERA_MAP){ if(s.includes(k)) return era; }
  return null;
}

function getSongBadgeClass(type){
  if(!type) return "sb-track";
  const t=type.toLowerCase();
  if(t==="타이틀") return "sb-title";
  if(t.includes("ost")||t.includes("참여")) return "sb-ost";
  if(t.includes("inst")) return "sb-inst";
  return "sb-track";
}
function getSongBadgeLabel(type){
  if(!type) return "수록곡";
  const t=type.toLowerCase();
  if(t.includes("ost")||t.includes("참여")) return "OST";
  if(t.includes("inst")) return "inst";
  return type;
}

// 시트 컬럼: 발매일(A) 앨범구분(B) 앨범명(C) 트랙#(D) 곡명(E) 곡구분(F) [숨김...] 링크(마지막 http 컬럼)
function csvToSongs(rows){
  let lastDate="", lastAlbumType="", lastAlbum="";
  return rows.map(r=>{
    // URL은 고정 인덱스 대신 http로 시작하는 컬럼 스캔
    const url=(r.find(v=>(v||"").trim().startsWith("http"))||"").trim();
    const date=(r[0]||"").trim()||lastDate;
    // albumType: r[1]이 URL이면 lastAlbumType 사용
    const rawB=(r[1]||"").trim();
    const albumType=(rawB&&!rawB.startsWith("http"))?rawB:lastAlbumType;
    const album=(r[2]||"").trim()||lastAlbum;
    const track=(r[3]||"").trim();
    const title=(r[4]||"").trim();
    // 곡구분: 타이틀/수록곡/OST/inst 중 하나인 컬럼 스캔
    const typeKeywords=["타이틀","수록곡","ost","inst","참여"];
    const type=r.slice(5).map(v=>(v||"").trim()).find(v=>v&&!v.startsWith("http")&&typeKeywords.some(k=>v.toLowerCase().includes(k)))||"";
    if(!title) return null;
    if((r[0]||"").trim()) lastDate=(r[0]||"").trim();
    if(rawB&&!rawB.startsWith("http")) lastAlbumType=rawB;
    if((r[2]||"").trim()) lastAlbum=(r[2]||"").trim();
    return {date,albumType,album,track,title,type,url};
  }).filter(Boolean);
}

async function loadSongsFromSheet(){

function renderSongs(){
  const el=document.getElementById("songs-content");
  let f=SONGS.filter(s=>{
    if(curSongYear!=="all"&&!s.date.startsWith(curSongYear)) return false;
    if(curSongAlbum!=="all"){
      const era=getSongEra(s.album,s.title);
      if(curSongAlbum==="뿌우통합"){
        if(era!=="뿌우"&&era!=="뿌우크리") return false;
      } else {
        if(era!==curSongAlbum) return false;
      }
    }
    if(curSongType!=="all"){
      const t=(s.type||"").toLowerCase();
      if(curSongType==="타이틀"&&t!=="타이틀") return false;
      if(curSongType==="수록곡"&&t!=="수록곡"&&t!=="") return false;
      if(curSongType==="ost"&&!t.includes("ost")&&!t.includes("참여")) return false;
      if(curSongType==="inst"&&!s.title.toLowerCase().includes("inst")) return false;
    }
    if(curSongQ){
      const q=curSongQ.toLowerCase();
      if(curSongTitleOnly){
        if(!s.title.toLowerCase().includes(q)) return false;
      } else {
        const haystack=(s.title+" "+s.album+" "+(s.albumType||"")+" "+(s.type||"")).toLowerCase();
        if(curSongTagMode==="exact"){
          if(!haystack.split(" ").some(w=>w===q)) return false;
        } else {
          if(!haystack.includes(q)) return false;
        }
      }
    }
    return true;
  });
  if(!f.length){el.innerHTML='<div class="empty"><div class="empty-icon">🎵</div>검색 결과가 없어요</div>';return;}

  // 앨범별 그룹핑
  const byAlbum={};
  f.forEach(s=>{
    const k=s.album||"기타";
    if(!byAlbum[k]){byAlbum[k]={songs:[],date:s.date,albumType:s.albumType};}
    byAlbum[k].songs.push(s);
  });

  const sortedAlbums=Object.keys(byAlbum).sort((a,b)=>{
    const da=byAlbum[a].date||"";
    const db=byAlbum[b].date||"";
    return curSongSort==="desc"?db.localeCompare(da):da.localeCompare(db);
  });

  el.innerHTML=sortedAlbums.map(album=>{
    const {songs,date,albumType}=byAlbum[album];
    const era=getSongEra(album,songs[0]?.title||"");
    const st=era?SONG_ERA_STYLE[era]:{bg:"rgba(255,255,255,.05)",border:"#444",text:"#aaa"};
    const cardsHtml=songs.map(s=>{
      const sid=`song_${s.date}_${(s.title||"").replace(/[^가-힣a-zA-Z0-9]/g,"").slice(0,15)}`;
      const bc=getSongBadgeClass(s.type);
      const bl=getSongBadgeLabel(s.type);
      const thumb=ytThumb(s.url);
      const bgStyle=thumb?`background-image:url('${thumb}')`:(`background:${st.bg}`);
      return`<div class="song-card" onclick="openSongModal(${JSON.stringify(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;')})">
        <div class="song-thumb-wrap">
          <div class="song-thumb-blur" style="${bgStyle};"></div>
          ${thumb?`<div class="song-thumb-img"><img src="${escH(thumb)}" onerror="this.style.display='none'" alt=""></div>`:'<div class="song-thumb-ph">🎵</div>'}
          <div class="song-top-badges">
            ${albumType&&!albumType.startsWith("http")?`<span class="song-badge" style="background:${st.bg};color:${st.text};border:1px solid ${st.border};">${escH(albumType)}</span>`:""}
            <span class="song-badge ${bc}">${bl}</span>
          </div>
          ${s.url?'<div class="song-link-icon">🔗</div>':""}
        </div>
        <div class="song-body">
          <div class="song-title-text" title="${escH(s.title)}">${escH(s.title)}</div>
          <div class="song-meta-mini">${escH(date)}</div>
        </div>
      </div>`;
    }).join("");
    return`<div class="songs-album-section">
      <div class="songs-album-header">
        <span class="songs-album-label" style="background:${st.bg};color:${st.text};border-color:${st.border};">${escH(album)}</span>
        <span class="songs-album-date">${escH(date)} · ${escH(albumType)}</span>
      </div>
      <div class="songs-grid">${cardsHtml}</div>
    </div>`;
  }).join("");
}

let songFiltersOpen=true;
function toggleSongFilters(){
  const el=document.getElementById("songs-filters-collapsible");
  const arrow=document.getElementById("song-filter-arrow");
  if(!el||!arrow) return;
  if(songFiltersOpen){
    el.style.maxHeight="0"; el.style.opacity="0";
    arrow.textContent="▼"; songFiltersOpen=false;
  } else {
    el.style.maxHeight="300px"; el.style.opacity="1";
    arrow.textContent="▲"; songFiltersOpen=true;
  }
}

// 발매곡 모달
let curSongData=null;
function openSongModal(s){
  curSongData=s;
  const sid=`song_${s.date}_${(s.title||"").replace(/[^가-힣a-zA-Z0-9]/g,"").slice(0,15)}`;
  const bc=getSongBadgeClass(s.type);
  const bl=getSongBadgeLabel(s.type);
  const era=getSongEra(s.album,s.title);
  const st=era?SONG_ERA_STYLE[era]:{bg:"rgba(255,255,255,.05)",border:"#444",text:"#aaa"};
  const thumb=ytThumb(s.url);
  const bgStyle=thumb?`background-image:url('${encodeURI(thumb)}')`:(`background:${st.bg}`);

  const tagsData=JSON.parse(localStorage.getItem("plave_v2_"+sid)||"{}");
  const tags=tagsData.tags||[];

  const overlay=document.createElement("div");
  overlay.className="song-modal-overlay";
  overlay.id="song-modal-overlay";
  overlay.style.display="flex";
  overlay.onclick=e=>{if(e.target===overlay) closeSongModal();};
  overlay.innerHTML=`
  <div class="song-modal-box">
    <a class="song-modal-left" ${s.url?`href="${escH(s.url)}" target="_blank"`:""}  style="text-decoration:none;">
      <div class="song-thumb-blur" style="${bgStyle};"></div>
      ${thumb?`<div class="song-thumb-img"><img src="${escH(thumb)}" onerror="this.style.display='none'" alt="" style="width:100%;height:100%;object-fit:cover;"></div>`:'<div class="song-thumb-ph" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:40px;">🎵</div>'}
      ${s.url?'<div class="song-modal-hover">▶ 바로가기</div>':""}
    </a>
    <div class="song-modal-right">
      <div class="song-modal-badges">
        ${s.albumType?`<span class="song-badge" style="background:${st.bg};color:${st.text};border:1px solid ${st.border};">${escH(s.albumType)}</span>`:""}
        <span class="song-badge ${bc}">${bl}</span>
      </div>
      <div>
        <div class="song-modal-title">${escH(s.title)}</div>
        <div class="song-modal-sub">${escH(s.album)} · ${escH(s.date)}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;">
        ${s.track?`<div style="display:flex;align-items:center;gap:6px;"><span class="song-modal-mk">트랙</span><span class="song-modal-mv">Track ${escH(s.track)}</span></div>`:""}
      </div>
      <hr class="song-modal-divider">
      <div style="display:flex;flex-direction:column;gap:5px;">
        <div class="song-tag-label">🏷️ 태그</div>
        <div class="song-tag-list" id="song-tag-list">
          ${tags.length?tags.map(t=>`<span class="song-tag" onclick="removeSongTag('${escH(sid)}','${escH(t)}')">${escH(t)} ✕</span>`).join(""):'<span class="song-tag-empty">없음</span>'}
        </div>
        <div class="song-tag-input-wrap">
          <input class="song-tag-input" id="song-tag-input" placeholder="입력 후 Enter"
            onkeydown="if(event.key==='Enter'){addSongTag('${escH(sid)}');}" />
        </div>
      </div>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

function closeSongModal(){
  const el=document.getElementById("song-modal-overlay");
  if(el) el.remove();
}

function addSongTag(sid){
  const input=document.getElementById("song-tag-input");
  const val=(input.value||"").trim();
  if(!val) return;
  const key="plave_v2_"+sid;
  const d=JSON.parse(localStorage.getItem(key)||"{}");
  if(!d.tags) d.tags=[];
  if(!d.tags.includes(val)){d.tags.push(val);localStorage.setItem(key,JSON.stringify(d));}
  input.value="";
  refreshSongTagList(sid,d.tags);
}

function removeSongTag(sid,tag){
  const key="plave_v2_"+sid;
  const d=JSON.parse(localStorage.getItem(key)||"{}");
  d.tags=(d.tags||[]).filter(t=>t!==tag);
  localStorage.setItem(key,JSON.stringify(d));
  refreshSongTagList(sid,d.tags);
}

function refreshSongTagList(sid,tags){
  const el=document.getElementById("song-tag-list");
  if(!el) return;
  el.innerHTML=tags.length
    ?tags.map(t=>`<span class="song-tag" onclick="removeSongTag('${escH(sid)}','${escH(t)}')">${escH(t)} ✕</span>`).join("")
    :'<span class="song-tag-empty">없음</span>';
}

});
setTimeout(updateStickyOffsets,200);
setTimeout(updateEraRowSeps,300);

// 시즌 필터 드래그 스크롤
(function(){
  const el=document.getElementById("era-filters");
  if(!el) return;
  let isDown=false,startX=0,scrollLeft=0;
  el.addEventListener("mousedown",e=>{
    if(e.target.tagName==="BUTTON") return;
    isDown=true; el.classList.add("dragging");
    startX=e.pageX-el.offsetLeft; scrollLeft=el.scrollLeft;
  });
  document.addEventListener("mouseup",()=>{isDown=false;el.classList.remove("dragging");});
  el.addEventListener("mousemove",e=>{
    if(!isDown) return;
    e.preventDefault();
    const x=e.pageX-el.offsetLeft;
    el.scrollLeft=scrollLeft-(x-startX);
  });
  // 터치 지원
  el.addEventListener("touchstart",e=>{startX=e.touches[0].pageX-el.offsetLeft;scrollLeft=el.scrollLeft;},{passive:true});
  el.addEventListener("touchmove",e=>{
    const x=e.touches[0].pageX-el.offsetLeft;
    el.scrollLeft=scrollLeft-(x-startX);
  },{passive:true});
})();
</script>
